<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="pageTitle">شاشة الانتظار - العيادة الذكية</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&family=Inter:wght@500;700;900&display=swap');
        * { font-family: 'Tajawal', 'Inter', sans-serif; }
        body { background: #0b1220; }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.45); } 50% { box-shadow: 0 0 0 30px rgba(16,185,129,0); } }
        .pulse-card { animation: pulseGlow 2.2s infinite; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
        .num-fade { animation: fadeIn 0.5s ease-out; }
        [dir="ltr"] .text-right { text-align: left; }
    </style>
</head>
<body class="min-h-screen text-white flex flex-col overflow-hidden">

    <header class="flex justify-between items-center px-8 py-5 border-b border-slate-700/60">
        <span class="text-2xl md:text-3xl font-black text-blue-400 flex items-center gap-3" data-i18n="clinicName">
            <i class="fa-solid fa-user-doctor"></i> العيادة الذكية
        </span>
        <div class="flex items-center gap-4">
            <span id="live-clock" class="text-xl md:text-2xl font-bold text-slate-300 tabular-nums"></span>
            <select id="lang-select" onchange="window.applyLanguage(this.value)" class="bg-slate-800 text-slate-200 text-sm font-bold rounded-xl px-3 py-2 outline-none cursor-pointer border border-slate-700">
                <option value="ar">🇸🇦 AR</option>
                <option value="en">🇬🇧 EN</option>
                <option value="fr">🇫🇷 FR</option>
            </select>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-6 p-6 md:p-10">
        <div class="pulse-card bg-emerald-600/90 rounded-[2.5rem] flex flex-col items-center justify-center p-8 shadow-2xl">
            <span class="text-2xl md:text-3xl font-bold opacity-90 mb-4 flex items-center gap-3" data-i18n="currentServingLabel">
                <i class="fa-solid fa-stethoscope"></i> قيد الفحص الآن
            </span>
            <span id="current-serving" class="num-fade text-[9rem] md:text-[13rem] leading-none font-black tabular-nums">-</span>
            <span id="current-serving-name" class="text-2xl md:text-3xl font-bold mt-4 opacity-95"></span>
        </div>
        <div class="bg-amber-500/90 rounded-[2.5rem] flex flex-col items-center justify-center p-8 shadow-2xl">
            <span class="text-2xl md:text-3xl font-bold opacity-90 mb-4 flex items-center gap-3" data-i18n="nextUpLabel">
                <i class="fa-solid fa-person-walking-arrow-right"></i> استعد، التالي للدخول
            </span>
            <span id="next-up" class="num-fade text-[9rem] md:text-[13rem] leading-none font-black tabular-nums">-</span>
            <span id="next-up-name" class="text-2xl md:text-3xl font-bold mt-4 opacity-95"></span>
        </div>
    </main>

    <footer class="border-t border-slate-700/60 px-8 py-6">
        <div class="text-slate-400 text-lg md:text-xl font-bold mb-3" data-i18n="upcomingLabel">التالي في الطابور</div>
        <div id="upcoming-list" class="flex gap-3 flex-wrap text-xl md:text-2xl font-black"></div>
    </footer>

    <script type="module">
        import { todayKey, listenToQueue } from "./clinic-core.js";

        const localeMap = { ar: 'ar-SA', en: 'en-US', fr: 'fr-FR' };
        let currentLang = localStorage.getItem('site_lang') || 'ar';

        const translations = {
            ar: {
                pageTitle: 'شاشة الانتظار - العيادة الذكية',
                clinicName: '<i class="fa-solid fa-user-doctor"></i> العيادة الذكية',
                currentServingLabel: '<i class="fa-solid fa-stethoscope"></i> قيد الفحص الآن',
                nextUpLabel: '<i class="fa-solid fa-person-walking-arrow-right"></i> استعد، التالي للدخول',
                upcomingLabel: 'التالي في الطابور', emptyQueue: 'لا يوجد مرضى بالانتظار حالياً',
            },
            en: {
                pageTitle: 'Waiting Room Display - Smart Clinic',
                clinicName: '<i class="fa-solid fa-user-doctor"></i> Smart Clinic',
                currentServingLabel: '<i class="fa-solid fa-stethoscope"></i> Currently Serving',
                nextUpLabel: '<i class="fa-solid fa-person-walking-arrow-right"></i> Get Ready, Next In',
                upcomingLabel: 'Coming Up Next', emptyQueue: 'No patients waiting right now',
            },
            fr: {
                pageTitle: "Écran de la salle d'attente - Clinique Intelligente",
                clinicName: '<i class="fa-solid fa-user-doctor"></i> Clinique Intelligente',
                currentServingLabel: '<i class="fa-solid fa-stethoscope"></i> En consultation',
                nextUpLabel: '<i class="fa-solid fa-person-walking-arrow-right"></i> Préparez-vous, au suivant',
                upcomingLabel: 'À suivre', emptyQueue: "Aucun patient en attente pour l'instant",
            }
        };

        function t(key) { return translations[currentLang][key] !== undefined ? translations[currentLang][key] : translations['ar'][key]; }

        let lastData = { active: null, waiting: [] };

        function applyLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('site_lang', lang);
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.title = t('pageTitle');
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerHTML = t(el.getAttribute('data-i18n')); });
            document.getElementById('lang-select').value = lang;
            renderQueue(lastData);
        }
        window.applyLanguage = applyLanguage;

        function renderQueue({ active, waiting }) {
            lastData = { active, waiting };
            document.getElementById('current-serving').innerText = active ? `#${active.role}` : '-';
            document.getElementById('current-serving-name').innerText = active ? active.name : '';
            document.getElementById('next-up').innerText = waiting.length > 0 ? `#${waiting[0].role}` : '-';
            document.getElementById('next-up-name').innerText = waiting.length > 0 ? waiting[0].name : '';

            const upcomingContainer = document.getElementById('upcoming-list');
            const rest = waiting.slice(1, 8);
            upcomingContainer.innerHTML = rest.length === 0
                ? `<span class="text-slate-500 text-lg font-bold">${t('emptyQueue')}</span>`
                : rest.map(p => `<span class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-2">#${p.role}</span>`).join('');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString(localeMap[currentLang], { hour: '2-digit', minute: '2-digit' })
                + ' • ' + now.toLocaleDateString(localeMap[currentLang], { weekday: 'long', day: 'numeric', month: 'long' });
        }

        applyLanguage(currentLang);
        updateClock();
        setInterval(updateClock, 1000);

        // اشتراك حي دائم - أي تغيير في العيادة ينعكس هنا فوراً بدون أي تأخير
        listenToQueue(todayKey(), renderQueue);
    </script>
</body>
</html>
