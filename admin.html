<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - العيادة الذكية</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        * { font-family: 'Tajawal', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .toast {
            position: fixed; bottom: 30px; right: 30px; background: #1e293b; color: white;
            padding: 16px 28px; border-radius: 40px; font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: none; z-index: 9999; max-width: 400px;
        }
        .toast.success { background: #0d9488; }
        .toast.error { background: #dc2626; }
        .toast.warning { background: #d97706; }
        .dark-mode { background: #0f172a; color: #e2e8f0; }
        .dark-mode .bg-white { background: #1e293b; color: #e2e8f0; }
        .dark-mode .bg-slate-50 { background: #1e293b; }
        .dark-mode .border-slate-100 { border-color: #334155; }
        .dark-mode .text-slate-500 { color: #94a3b8; }
        .dark-mode .text-slate-900 { color: #f1f5f9; }
        .scrollbar-thin::-webkit-scrollbar { width: 4px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        @media (max-width: 640px) { .toast { right: 10px; left: 10px; max-width: none; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen transition-colors duration-300" id="appBody">

    <div id="login-screen" class="min-h-screen flex justify-center items-center p-4">
        <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl max-w-sm w-full shadow-2xl text-center animate-fade-in border border-slate-100 dark:border-slate-700">
            <div class="text-4xl mb-3">🔒</div>
            <h2 class="text-xl font-bold text-slate-900 dark:text-white mb-1">دخول الإدارة</h2>
            <p class="text-slate-500 dark:text-slate-400 text-xs mb-5">خاص بموظف الاستقبال أو الطبيب</p>
            <input type="password" id="adminPassword" placeholder="أدخل كلمة المرور"
                   class="w-full p-3 border border-slate-200 dark:border-slate-600 rounded-xl text-center text-lg focus:ring-2 focus:ring-blue-500 mb-4 outline-none bg-white dark:bg-slate-700 dark:text-white">
            <button onclick="window.login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition cursor-pointer">تسجيل الدخول</button>
            <div id="loginError" class="text-red-600 text-sm mt-3 hidden">❌ كلمة المرور غير صحيحة</div>
        </div>
    </div>

    <div id="clinic-view" class="hidden">
        <nav class="bg-white dark:bg-slate-800 border-b border-slate-100 dark:border-slate-700 p-4 sticky top-0 z-50 shadow-sm">
            <div class="max-w-4xl mx-auto flex justify-between items-center flex-wrap gap-2">
                <span class="font-bold text-lg text-blue-600 dark:text-blue-400"><i class="fa-solid fa-user-doctor ml-2 text-blue-500"></i>لوحة الإدارة</span>
                <div class="flex gap-2 items-center flex-wrap">
                    <button onclick="window.toggleDarkMode()" class="bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-300 px-3 py-1.5 rounded-xl text-xs font-bold cursor-pointer">
                        <i class="fa-solid fa-moon dark:hidden"></i><i class="fa-solid fa-sun hidden dark:inline"></i>
                    </button>
                    <a href="tv.html" target="_blank" class="bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-400 px-3 py-1.5 rounded-xl text-xs font-bold cursor-pointer inline-flex items-center">
                        <i class="fa-solid fa-tv ml-1"></i> شاشة الانتظار
                    </a>
                    <button onclick="window.exportExcelReport()" class="bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-400 px-3 py-1.5 rounded-xl text-xs font-bold cursor-pointer">
                        <i class="fa-solid fa-file-excel ml-1"></i> تقرير
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-md mx-auto p-4 mt-4">
            <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-xl p-6 border border-slate-100 dark:border-slate-700">
                <div class="flex justify-between items-center mb-6 pb-3 border-b border-slate-100 dark:border-slate-700 flex-wrap gap-2">
                    <div>
                        <h1 class="text-lg font-bold text-slate-900 dark:text-white">🩺 لوحة الاستقبال</h1>
                        <p class="text-slate-400 dark:text-slate-500 text-xs" id="live-date"></p>
                        <p class="text-[10px] text-emerald-600 dark:text-emerald-400 font-bold mt-0.5"><i class="fa-solid fa-tower-broadcast"></i> متصل لحظياً - Firestore</p>
                    </div>
                    <button onclick="window.logout()" class="text-xs bg-slate-50 dark:bg-slate-700 text-slate-600 dark:text-slate-300 px-3 py-1.5 rounded-lg font-bold cursor-pointer">
                        <i class="fa-solid fa-arrow-right ml-1"></i> خروج
                    </button>
                </div>

                <div class="grid grid-cols-3 gap-2.5 mb-3">
                    <div class="bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-100 dark:border-emerald-800 p-3 rounded-xl text-center">
                        <span class="block text-[10px] text-emerald-700 dark:text-emerald-400 font-bold">بالداخل</span>
                        <span id="stat-active" class="text-xl font-bold text-emerald-900 dark:text-emerald-300">-</span>
                    </div>
                    <div class="bg-amber-50 dark:bg-amber-900/20 border border-amber-100 dark:border-amber-800 p-3 rounded-xl text-center">
                        <span class="block text-[10px] text-amber-700 dark:text-amber-400 font-bold">في الانتظار</span>
                        <span id="stat-waiting" class="text-xl font-bold text-amber-900 dark:text-amber-300">0</span>
                    </div>
                    <div class="bg-slate-50 dark:bg-slate-700/50 border border-slate-100 dark:border-slate-600 p-3 rounded-xl text-center">
                        <span class="block text-[10px] text-slate-600 dark:text-slate-400 font-bold">الإجمالي</span>
                        <span id="stat-total" class="text-xl font-bold text-slate-800 dark:text-white">0</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2 mb-4">
                    <div class="bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 p-2 rounded-xl text-center">
                        <span class="block text-[10px] text-green-700 dark:text-green-400 font-bold">✅ مكتمل</span>
                        <span id="stat-completed" class="text-xl font-bold text-green-900 dark:text-green-300">0</span>
                    </div>
                    <div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 p-2 rounded-xl text-center">
                        <span class="block text-[10px] text-red-700 dark:text-red-400 font-bold">⛔ غائب</span>
                        <span id="stat-no-show" class="text-xl font-bold text-red-900 dark:text-red-300">0</span>
                    </div>
                </div>

                <div class="mb-4 bg-slate-50 dark:bg-slate-700/50 p-2 rounded-xl border border-slate-200 dark:border-slate-600 text-center">
                    <span class="text-[10px] text-slate-500 dark:text-slate-400">نسبة الإنجاز اليومية</span>
                    <div class="flex items-center gap-2 justify-center">
                        <div class="w-full max-w-xs bg-slate-200 dark:bg-slate-600 rounded-full h-2.5">
                            <div id="completion-bar" class="bg-emerald-500 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                        </div>
                        <span id="completion-rate" class="text-sm font-bold text-slate-800 dark:text-white">0%</span>
                    </div>
                </div>

                <div id="active-patient-card" class="hidden mb-4 p-4 bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-2xl animate-fade-in">
                    <div class="mb-3">
                        <span class="text-[10px] text-blue-600 dark:text-blue-400 font-bold block mb-0.5">🟢 المريض الحالي بالداخل</span>
                        <span id="active-patient-name" class="font-bold text-slate-900 dark:text-white text-sm"></span>
                        <span id="active-patient-role" class="text-blue-600 dark:text-blue-400 font-bold text-xs mr-1"></span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="window.finishActive()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl text-xs cursor-pointer">
                            <i class="fa-solid fa-check ml-1"></i> تم الكشف
                        </button>
                        <button onclick="window.markNoShow()" class="flex-1 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 font-bold py-2.5 rounded-xl text-xs cursor-pointer">
                            <i class="fa-solid fa-user-slash ml-1"></i> لم يحضر
                        </button>
                    </div>
                </div>

                <button onclick="window.callNext()" id="call-next-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl transition flex justify-center items-center gap-2 text-sm shadow-md cursor-pointer mb-5 disabled:opacity-40 disabled:cursor-not-allowed">
                    <i class="fa-solid fa-bullhorn"></i> استدعاء المريض التالي
                </button>

                <h3 class="text-xs font-bold text-slate-500 dark:text-slate-400 mb-3">
                    <i class="fa-solid fa-list-ol ml-1"></i> طابور الانتظار: <span id="waiting-count-label" class="text-amber-600 dark:text-amber-400">0</span>
                </h3>

                <div id="queue-list" class="space-y-2 max-h-72 overflow-y-auto pr-1 scrollbar-thin"></div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { db, CLINIC_ID, functionsInstance } from "./firebase-config.js";
        import { httpsCallable } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-functions.js";
        import {
            todayKey, listenToQueue, listenToDayStats,
            markActive, markCompleted, markNoShow as markNoShowCore, renamePatient,
            removeAppointment, delayToEndOfQueue
        } from "./clinic-core.js";

        const ADMIN_PASS = 'admin123'; // ⚠️ غيّرها فوراً، ولاحظ أن الحماية الحقيقية لاحقاً يجب أن تكون عبر Firebase Auth

        function showToast(msg, type = '') {
            const el = document.getElementById('toast');
            el.textContent = msg; el.className = 'toast ' + type; el.style.display = 'block';
            clearTimeout(el._timeout);
            el._timeout = setTimeout(() => el.style.display = 'none', 3500);
        }
        function playSound() {
            try {
                const audio = new Audio('data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVwAAAA=');
                audio.volume = 0.3; audio.play().catch(() => {});
            } catch (e) {}
        }

        function toggleDarkMode() {
            document.getElementById('appBody').classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.getElementById('appBody').classList.contains('dark-mode'));
        }
        window.toggleDarkMode = toggleDarkMode;
        if (localStorage.getItem('darkMode') === 'true') document.getElementById('appBody').classList.add('dark-mode');

        window.login = function () {
            const pass = document.getElementById('adminPassword').value;
            if (pass === ADMIN_PASS) {
                sessionStorage.setItem('clinic_auth', 'true');
                document.getElementById('adminPassword').value = '';
                document.getElementById('loginError').classList.add('hidden');
                showClinicView();
                showToast('🔓 تم تسجيل الدخول بنجاح', 'success');
            } else {
                document.getElementById('loginError').classList.remove('hidden');
                document.getElementById('adminPassword').value = '';
            }
        };
        document.getElementById('adminPassword').addEventListener('keyup', (e) => { if (e.key === 'Enter') window.login(); });

        window.logout = function () {
            sessionStorage.removeItem('clinic_auth');
            stopListeners();
            document.getElementById('clinic-view').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        };

        function showClinicView() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('clinic-view').classList.remove('hidden');
            startListeners();
        }
        if (sessionStorage.getItem('clinic_auth') === 'true') showClinicView();

        // ========== حالة لحظية ==========
        let currentActive = null;
        let currentWaiting = [];
        let unsubQueue = null;
        let unsubStats = null;

        function startListeners() {
            const today = todayKey();
            document.getElementById('live-date').innerText = new Date().toLocaleDateString('ar-SA', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

            unsubQueue = listenToQueue(today, ({ active, waiting }) => {
                currentActive = active; currentWaiting = waiting;
                renderClinicQueue();
            });

            unsubStats = listenToDayStats(today, (dayList) => {
                const completed = dayList.filter(a => a.status === 'completed').length;
                const noShow = dayList.filter(a => a.status === 'no-show').length;
                const total = dayList.length;
                const rate = total > 0 ? Math.round((completed / total) * 100) : 0;

                document.getElementById('stat-total').innerText = total;
                document.getElementById('stat-completed').innerText = completed;
                document.getElementById('stat-no-show').innerText = noShow;
                document.getElementById('completion-rate').innerText = `${rate}%`;
                document.getElementById('completion-bar').style.width = `${rate}%`;
            });
        }
        function stopListeners() {
            if (unsubQueue) { unsubQueue(); unsubQueue = null; }
            if (unsubStats) { unsubStats(); unsubStats = null; }
        }

        function renderClinicQueue() {
            document.getElementById('stat-active').innerText = currentActive ? `#${currentActive.role}` : '-';
            document.getElementById('stat-waiting').innerText = currentWaiting.length;
            document.getElementById('waiting-count-label').innerText = currentWaiting.length;

            const activeCard = document.getElementById('active-patient-card');
            const callBtn = document.getElementById('call-next-btn');
            if (currentActive) {
                activeCard.classList.remove('hidden');
                document.getElementById('active-patient-name').innerText = currentActive.name;
                document.getElementById('active-patient-role').innerText = `#${currentActive.role}`;
                callBtn.disabled = true;
            } else {
                activeCard.classList.add('hidden');
                callBtn.disabled = false;
            }

            const container = document.getElementById('queue-list');
            if (currentWaiting.length === 0) {
                container.innerHTML = `<div class="text-center py-6 text-slate-400 dark:text-slate-500 text-xs">📭 الطابور فارغ حالياً</div>`;
                return;
            }
            container.innerHTML = currentWaiting.map((p, idx) => {
                const isNext = idx === 0;
                return `
                    <div class="flex justify-between items-center p-3 rounded-xl border ${isNext ? 'bg-amber-50 dark:bg-amber-900/20 border-amber-200 dark:border-amber-700' : 'bg-slate-50 dark:bg-slate-700/50 border-slate-200 dark:border-slate-600'} text-xs">
                        <div class="flex-1 min-w-0">
                            <div class="font-bold text-slate-900 dark:text-white flex items-center gap-1 flex-wrap">
                                ${p.name} ${isNext ? '<span class="bg-amber-600 text-white px-1.5 py-0.5 rounded text-[9px] font-bold">التالي</span>' : ''}
                            </div>
                            <div class="text-slate-400 dark:text-slate-500 text-[10px] mt-0.5">📱 ${p.phone} | ⏰ ${p.time}</div>
                        </div>
                        <div class="flex items-center gap-1.5 flex-wrap">
                            <span class="font-bold bg-white dark:bg-slate-600 px-2 py-1 rounded border border-slate-200 dark:border-slate-500 text-xs">#${p.role}</span>
                            <button onclick="window.delayPatient('${p.id}','${p.date}')" class="bg-slate-200 dark:bg-slate-600 text-slate-700 dark:text-slate-300 px-2 py-1 rounded text-[10px] cursor-pointer" title="تأجيل"><i class="fa-solid fa-clock"></i></button>
                            <button onclick="window.editPatient('${p.id}','${p.name.replace(/'/g, "\\'")}')" class="bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-2 py-1 rounded text-[10px] cursor-pointer" title="تعديل"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="window.removePatient('${p.id}')" class="text-red-500 bg-white dark:bg-slate-600 p-1 rounded border border-slate-200 dark:border-slate-500 cursor-pointer" title="حذف"><i class="fa-solid fa-trash-can text-xs"></i></button>
                        </div>
                    </div>`;
            }).join('');
        }

        // ========== إرسال إشعار حقيقي عبر Cloud Function ==========
        const notifyPatientFn = httpsCallable(functionsInstance, 'notifyPatient');
        async function sendPushNotification(appointmentId, kind) {
            try {
                const result = await notifyPatientFn({ clinicId: CLINIC_ID, appointmentId, kind });
                return result.data;
            } catch (e) {
                console.warn('تعذر إرسال الإشعار (تحقق من نشر Cloud Functions):', e);
                return { sent: false };
            }
        }

        window.callNext = async function () {
            if (currentActive) { showToast('⚠️ يوجد مريض بالداخل حالياً، أنهِ حالته أولاً', 'warning'); return; }
            if (currentWaiting.length === 0) { showToast('📭 لا يوجد مرضى في الانتظار', 'warning'); playSound(); return; }

            const nextIn = currentWaiting[0];
            await markActive(nextIn.id, nextIn.role);
            showToast(`🟢 تم استدعاء ${nextIn.name} (دور #${nextIn.role})`, 'success');
            playSound();

            const result = await sendPushNotification(nextIn.id, 'turn');
            if (!result.sent) showToast('ℹ️ لم يصل إشعار Push (تأكد من نشر Cloud Functions ووجود توكن للمريض)', 'warning');

            if (currentWaiting.length > 1) {
                const notifyTarget = currentWaiting[1];
                setTimeout(async () => {
                    const r2 = await sendPushNotification(notifyTarget.id, 'next');
                    if (r2.sent) showToast(`📱 تم إرسال تنبيه حقيقي إلى ${notifyTarget.name}`, 'success');
                }, 500);
            }
        };

        window.finishActive = async function () {
            if (!currentActive) return;
            await markCompleted(currentActive.id);
            showToast(`✅ تم إنهاء كشف ${currentActive.name}`, 'success');
            playSound();
        };

        window.markNoShow = async function () {
            if (!currentActive) return;
            if (!confirm(`هل تريد تسجيل "${currentActive.name}" كغائب عن الدور؟`)) return;
            await markNoShowCore(currentActive.id);
            showToast(`⛔ تم تسجيل ${currentActive.name} كغائب`, 'warning');
            playSound();
        };

        window.delayPatient = async function (id, date) {
            await delayToEndOfQueue(id, date);
            showToast('⏳ تم تأجيل المريض لنهاية الطابور', 'warning');
            playSound();
        };

        window.editPatient = async function (id, currentName) {
            const newName = prompt('تعديل الاسم:', currentName);
            if (newName && newName.trim()) {
                await renamePatient(id, newName.trim());
                showToast('✅ تم تحديث الاسم', 'success');
            }
        };

        window.removePatient = async function (id) {
            if (!confirm('⚠️ هل أنت متأكد من حذف هذا المريض نهائياً؟')) return;
            await removeAppointment(id);
            showToast('🗑️ تم الحذف', 'error');
        };

        // ========== تصدير تقرير CSV ==========
        window.exportExcelReport = async function () {
            const { getDocs, collection } = await import("https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js");
            const snap = await getDocs(collection(db, "clinics", CLINIC_ID, "appointments"));
            const all = snap.docs.map(d => d.data());
            if (all.length === 0) { showToast('📭 لا توجد بيانات للتصدير', 'warning'); return; }

            let csv = 'الاسم,الهاتف,التاريخ,الدور,الوقت,الحالة\n';
            all.forEach(p => { csv += `${p.name},${p.phone},${p.date || ''},${p.role},${p.time},${p.status}\n`; });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `تقرير_العيادة_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            URL.revokeObjectURL(link.href);
            showToast('📄 تم تصدير التقرير بنجاح', 'success');
        };
    </script>
</body>
</html>
